<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Крестики-Нолики Online</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="wrapper">
    <h1><span class="x-color">✕</span> Крестики-Нолики <span class="o-color">○</span></h1>

    <div id="lobby">
      <p class="subtitle">Сетевая игра · 5×5 · 5 в ряд</p>
      <button id="joinBtn">Найти игру</button>
    </div>

    <div id="waiting" class="hidden">
      <div class="spinner"></div>
      <p>Ожидание соперника...</p>
      <p class="room-id">Комната: <span id="roomId"></span></p>
    </div>

    <div id="game" class="hidden">
      <div class="game-layout">

        <!-- Левая колонка: статус + доска + счёт -->
        <div class="board-col">
          <div class="status-bar">
            <div id="status"></div>
            <div id="timer" class="timer hidden">
              <svg class="timer-ring" viewBox="0 0 36 36">
                <circle class="timer-bg" cx="18" cy="18" r="15"/>
                <circle id="timerArc" class="timer-arc" cx="18" cy="18" r="15"/>
              </svg>
              <span id="timerCount">20</span>
            </div>
          </div>

          <div id="board" class="board"></div>

          <div id="score" class="score">
            <span class="label-x">X <b id="scoreX">0</b></span>
            <span>Ничья <b id="scoreDraw">0</b></span>
            <span class="label-o">O <b id="scoreO">0</b></span>
          </div>

          <button id="restartBtn" class="hidden">Играть снова</button>
        </div>

        <!-- Правая колонка: чат -->
        <div class="chat-col">
          <div class="chat-header">Чат</div>
          <div id="chatMessages" class="chat-messages"></div>
          <div class="chat-input-row">
            <input id="chatInput" type="text" placeholder="Написать..." maxlength="200" />
            <button id="chatSend">→</button>
          </div>
        </div>

      </div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
